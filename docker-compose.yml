version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens
      POSTGRES_DB: repolens
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://repolens:repolens@db:5432/repolens
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  pgdata: